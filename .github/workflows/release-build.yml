name: Library Generate Release

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # android 디렉토리 없앰으로 인한 주석 처리
    # env:
    #   working-directory: ./android

    steps:        
      - name: SetUp JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
          bundler-cache: true
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: SetUp properties
        run: |
          echo "keystore.release.file_path=${{ secrets.KEYSTORE_RELEASE_FILE_PATH }}" > local.properties
          echo "keystore.release.store_password=${{ secrets.KEYSTORE_RELEASE_PW }}" >> local.properties
          echo "keystore.release.key_alias=${{ secrets.KEYSTORE_RELEASE_ALIAS }}" >> local.properties
          echo "keystore.release.key_password=${{ secrets.KEYSTORE_RELEASE_KEY_PW }}" >> local.properties
          echo "base_url=\"${{ secrets.BASE_URL }}\"" >> local.properties
          echo "auth_type=\"${{ secrets.AUTH_TYPE }}\"" >> local.properties
          
     # 최근에 커밋한 내용으로 릴리즈 노트 작성
      - name: Generate Release Note
        run: ./gradlew generateReleaseNote
        # working-directory: ${{ env.working-directory }}

      # Dependency 에 버전 및 릴리즈 메시지 가져오기
      - name: Release Version
        id: release
        run: |
          echo ::set-output name=code::$(grep versionCode buildSrc/src/main/java/Dependencies.kt | awk '{print $5}')
          echo ::set-output name=name::$(grep versionName buildSrc/src/main/java/Dependencies.kt | awk '{print $5}')
          echo ::set-output name=title::$(sed -n -e '1,1p' appRelease/release_note.txt)
        # working-directory: ${{ env.working-directory }}

      # Tag 명 "" 제거해서 가져오기
      - name: Get Tag Name
        id: get_tag
        run: echo ::set-output name=name::${{steps.release.outputs.name}}

      # Release Message 가져오기
      - name: Get Release Message
        id: get_release
        run: |
          RELEASE_BODY=$(sed -n '2,$p' appRelease/release_note.txt | less)
          RELEASE_BODY="${RELEASE_BODY//'%'/'%25'}"
          RELEASE_BODY="${RELEASE_BODY//$'\n'/'%0A'}"
          RELEASE_BODY="${RELEASE_BODY//$'\r'/'%0D'}"
          echo ::set-output name=val::${RELEASE_BODY}
        # working-directory: ${{ env.working-directory }}

      # 릴리즈 생성
      # release_name: 릴리즈 제목
      # tag_name: 버전 이름
      # body: 릴리즈 메시지 내용
      - name: Generate Release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_name: ${{steps.release.outputs.title}}
          tag_name: ${{steps.get_tag.outputs.name}}
          body: |
            ${{steps.get_release.outputs.val}}
          draft: false
          prerelease: false
